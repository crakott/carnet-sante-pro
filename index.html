    <script type="text/babel" data-type="module" data-presets="react">
        import { initializeApp } from "https://cdn.jsdelivr.net/npm/firebase@10.7.0/app/+esm";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, sendPasswordResetEmail, getAdditionalUserInfo } from "https://cdn.jsdelivr.net/npm/firebase@10.7.0/auth/+esm";
        import { initializeFirestore, getFirestore, persistentLocalCache, persistentMultipleTabManager, collection, addDoc, query, where, getDocs, getDoc, updateDoc, deleteDoc, doc, setDoc, onSnapshot } from "https://cdn.jsdelivr.net/npm/firebase@10.7.0/firestore/+esm";
        import { getFunctions, httpsCallable } from "https://cdn.jsdelivr.net/npm/firebase@10.7.0/functions/+esm";

        // Format an ISO date string (YYYY-MM-DD) to DD/MM/YYYY for display
        const formatDate = (dateStr) => {
            if (!dateStr) return '';
            const parts = dateStr.split('-');
            if (parts.length !== 3) return dateStr;
            return `${parts[2]}/${parts[1]}/${parts[0]}`;
        };

        // Compute the number of days remaining until a date, with a display label and color
        const getCountdown = (dateStr) => {
            if (!dateStr) return null;
            const target = new Date(dateStr);
            if (isNaN(target.getTime())) return null;
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            target.setHours(0, 0, 0, 0);
            const days = Math.round((target - today) / (1000 * 60 * 60 * 24));
            let label, color;
            if (days < 0) {
                label = `En retard de ${Math.abs(days)} j`;
                color = '#ef4444';
            } else if (days === 0) {
                label = `Aujourd'hui`;
                color = '#ef4444';
            } else if (days <= 7) {
                label = `Dans ${days} j`;
                color = '#f59e0b';
            } else {
                label = `Dans ${days} j`;
                color = '#10b981';
            }
            return { days, label, color };
        };

        // Read an image file, downscale it to maxPx and return a JPEG data-URL via callback
        const readImageAsResizedDataUrl = (file, maxPx, quality, onResult, onError) => {
            if (!file || !file.type.startsWith('image/')) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const scale = Math.min(1, maxPx / Math.max(img.width, img.height));
                    const canvas = document.createElement('canvas');
                    canvas.width = Math.round(img.width * scale);
                    canvas.height = Math.round(img.height * scale);
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    onResult(canvas.toDataURL('image/jpeg', quality));
                };
                img.onerror = () => onError && onError();
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        };

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDZ_dc_HfSmXL1pjeKwT7uD1xX2lbr48c0",
            authDomain: "carnet-sante-pro.firebaseapp.com",
            projectId: "carnet-sante-pro",
            storageBucket: "carnet-sante-pro.firebasestorage.app",
            messagingSenderId: "1059301417055",
            appId: "1:1059301417055:web:8f5f81e0b075063ad4fbea"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        // Persistance locale (IndexedDB) : permet de consulter et modifier les données
        // déjà chargées hors connexion, avec synchronisation automatique au retour du réseau
        let db;
        try {
            db = initializeFirestore(app, {
                localCache: persistentLocalCache({ tabManager: persistentMultipleTabManager() })
            });
        } catch (e) {
            console.warn('Persistance Firestore indisponible, mode mémoire utilisé:', e);
            db = getFirestore(app);
        }
        const functions = getFunctions(app, 'europe-west1');

        // Reference data for animal profiles, vaccines, medications and vets
        const ESPECES = ['Chien', 'Chat', 'Lapin', 'Hamster', 'Gerbille', 'Cheval', 'Oiseau', 'Tortue'];
        const EMOJIS_ESPECE = {
            'Chien': '🐕', 'Chat': '🐈', 'Lapin': '🐰', 'Hamster': '🐹',
            'Cheval': '🐴', 'Oiseau': '🦜', 'Tortue': '🐢', 'Gerbille': '🐭'
        };
        const VACCINS_COURANTS = {
            'Chien': ['Rage', 'DTP', 'Parvovirose', 'Leptospirose'],
            'Chat': ['Rage', 'Typhus félin', 'Calicivirose', 'Rhinotrachéite', 'Coryza', 'Chlamydophilose', 'Leucose féline'],
            'Cheval': ['Grippe équine', 'Tétanos', 'Rhinopneumonite'],
            'Lapin': ['Myxomatose', 'VHD', 'VHD2'],
            'Hamster': [], 'Gerbille': [], 'Tortue': [],
            'Oiseau': ['Paramyxovirus', 'Newcastle'],
        };
        const MEDICAMENTS_COURANTS = [
            'Amoxicilline', 'Doxycycline', 'Métronidazole', 'Fluconazole',
            'Paracétamol', 'Ibuprofène', 'Carprofen', 'Meloxicam',
            'Prednisone', 'Dexaméthasone', 'Loratadine', 'Cetirizine',
            'Oméprazole', 'Famotidine', 'Lactulose', 'Probiotiques'
        ];
        const VETERINAIRES = [
            { id: 1, nom: "Clinique Saint-Germain", distance: "2.3 km", lat: 48.8539, lng: 2.3340, telephone: "01 23 45 67 89", horaires: "Lun-Ven: 9h-19h", specialites: ["Chiens", "Chats"], rating: 4.8 },
            { id: 2, nom: "Vétérinaire 24h/24", distance: "5.1 km", lat: 48.8907, lng: 2.3617, telephone: "01 98 76 54 32", horaires: "24h/24, 7j/7", specialites: ["Urgences"], rating: 4.6 },
            { id: 3, nom: "Clinique Exotiques", distance: "3.8 km", lat: 48.8330, lng: 2.3708, telephone: "01 45 23 12 34", horaires: "Lun-Ven: 10h-18h", specialites: ["Reptiles", "Oiseaux"], rating: 4.9 },
        ];
        const TYPE_LABELS = {
            comportement: '🐾 Comportement', selles: '💩 Selles', urine: '🚽 Urine',
            blessure: '🩹 Blessure', maladie: '🤒 Maladie', autres: '➕ Autres'
        };
        const MAX_FILE_SIZE = 700 * 1024;

        // Distance in km between two lat/lng points (Haversine formula)
        const getDistanceKm = (lat1, lng1, lat2, lng2) => {
            const toRad = (deg) => deg * Math.PI / 180;
            const R = 6371;
            const dLat = toRad(lat2 - lat1);
            const dLng = toRad(lng2 - lng1);
            const a = Math.sin(dLat / 2) ** 2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng / 2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        };

        // Recherche les cliniques vétérinaires réelles autour d'une position via OpenStreetMap (Overpass API)
        const OVERPASS_ENDPOINTS = [
            'https://overpass-api.de/api/interpreter',
            'https://overpass.kumi.systems/api/interpreter',
        ];
        const fetchNearbyVets = async (lat, lng) => {
            const query = `[out:json][timeout:25];(node["amenity"="veterinary"](around:25000,${lat},${lng});way["amenity"="veterinary"](around:25000,${lat},${lng}););out center 30;`;
            let lastError = null;
            for (const endpoint of OVERPASS_ENDPOINTS) {
                try {
                    const res = await fetch(endpoint, { method: 'POST', body: 'data=' + encodeURIComponent(query) });
                    if (!res.ok) throw new Error('HTTP ' + res.status);
                    const data = await res.json();
                    return (data.elements || [])
                        .map(el => {
                            const tags = el.tags || {};
                            const vLat = el.lat ?? el.center?.lat;
                            const vLng = el.lon ?? el.center?.lon;
                            if (vLat == null || vLng == null) return null;
                            const adresse = [tags['addr:housenumber'], tags['addr:street'], tags['addr:postcode'], tags['addr:city']].filter(Boolean).join(' ');
                            return {
                                id: `osm-${el.type}-${el.id}`,
                                nom: tags.name || tags.brand || 'Vétérinaire',
                                telephone: tags.phone || tags['contact:phone'] || null,
                                horaires: tags.opening_hours || null,
                                adresse: adresse || null,
                                lat: vLat,
                                lng: vLng,
                            };
                        })
                        .filter(Boolean);
                } catch (err) {
                    lastError = err;
                }
            }
            throw lastError || new Error('Service de recherche indisponible');
        };

        // Build a clear summary of an animal's record: vaccine names, current weight,
        // ongoing medications and the kinds of observations logged
        const getAnimalDossier = (animal) => {
            const todayStr = new Date().toISOString().split('T')[0];
            const vaccinNames = (animal.vaccins || []).map(v => v.nom);
            const lastWeight = [...(animal.poids || [])].sort((a, b) => new Date(b.date) - new Date(a.date))[0] || null;
            const currentMedications = (animal.medicaments || []).filter(m => todayStr >= m.dateDebut && todayStr <= m.dateFin);
            const observationTypes = [...new Set((animal.observations || []).map(o => o.type))];
            return { vaccinNames, lastWeight, currentMedications, observationTypes };
        };

        // Format an animal's record as plain text, ready to be sent by email to a vétérinaire.
        // Includes the full written content of every observation (mailto: links can't carry photo/audio attachments,
        // so those are pointed to the printable dossier report instead).
        const buildDossierEmailBody = (animal) => {
            const { vaccinNames, lastWeight, currentMedications } = getAnimalDossier(animal);
            const observations = [...(animal.observations || [])].sort((a, b) => new Date(b.date) - new Date(a.date));
            const obsLines = observations.length > 0
                ? observations.map(o => {
                    const label = (TYPE_LABELS[o.type] || o.type).replace(/^\S+\s/, '');
                    const attachments = [o.photo ? '📷 photo' : null, o.audio ? '🎙️ audio' : null].filter(Boolean).join(' + ');
                    return `  • [${o.date}] ${label}${o.description ? ' — ' + o.description : ''}${attachments ? ` (${attachments}, voir le dossier complet)` : ''}`;
                })
                : ['  • aucune observation enregistrée'];
            const hasMedia = observations.some(o => o.photo || o.audio);

            return [
                `Dossier santé de ${animal.nom} (${EMOJIS_ESPECE[animal.espece] || ''} ${animal.espece}${animal.race ? ', ' + animal.race : ''})`,
                animal.sexe ? `Sexe : ${animal.sexe === 'male' ? 'Mâle' : 'Femelle'}${animal.sterilise ? ' (stérilisé/castré)' : ''}` : null,
                animal.dateNaissance ? `Date de naissance : ${formatDate(animal.dateNaissance)}` : null,
                '',
                `💉 Vaccins : ${vaccinNames.length > 0 ? vaccinNames.join(', ') : 'aucun enregistré'}`,
                `⚖️ Poids actuel : ${lastWeight ? `${lastWeight.valeur} kg (mesuré le ${lastWeight.date})` : 'non renseigné'}`,
                `💊 Médicaments en cours : ${currentMedications.length > 0 ? currentMedications.map(m => `${m.nom} (${m.dosage}${m.unite}, ${m.frequence})`).join(', ') : 'aucun'}`,
                '',
                '📋 Observations :',
                ...obsLines,
                hasMedia ? "\nℹ️ Certaines observations contiennent des photos ou enregistrements audio : ouvrez le dossier complet (bouton « 🖨️ Dossier complet ») pour les consulter ou les joindre à cet e-mail." : null,
                '',
                'Envoyé depuis Carnet Santé PRO'
            ].filter(line => line !== null).join('\n');
        };

        // Escape text before injecting it into the printable HTML report (the report is built via document.write)
        const escapeHtml = (str) => String(str ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

        // Convert a base64 data-URL to a File object suitable for the Web Share API
        const dataUrlToFile = (dataUrl, baseName) => {
            const match = dataUrl.match(/^data:([^;]+);base64,(.*)$/s);
            if (!match) return null;
            const mime = match[1];
            const binary = atob(match[2]);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
            const ext = mime.split('/')[1].replace('jpeg', 'jpg').split('+')[0];
            return new File([bytes], `${baseName}.${ext}`, { type: mime });
        };

        // Share a photo or audio via the native OS share sheet (iOS/Android),
        // or fall back to downloading the file if Web Share API isn't available.
        const shareOrDownloadMedia = async (dataUrl, baseName, shareTitle, shareText) => {
            const file = dataUrlToFile(dataUrl, baseName);
            if (!file) return;
            // Build a companion .txt file so the observation text is reliably present
            // even when the email app ignores the Web Share API 'text' field
            const txtFile = shareText
                ? new File([shareText], `${baseName}-observation.txt`, { type: 'text/plain' })
                : null;
            const filesToShare = txtFile ? [file, txtFile] : [file];
            try {
                if (navigator.canShare && navigator.canShare({ files: filesToShare })) {
                    await navigator.share({ files: filesToShare, title: shareTitle, text: shareText || '' });
                    return;
                }
            } catch (err) {
                if (err.name === 'AbortError') return;
                console.error('Erreur partage fichier:', err);
            }
            // Fallback desktop: download the media file then open a pre-filled mailto
            const url = URL.createObjectURL(file);
            const a = document.createElement('a');
            a.href = url; a.download = file.name;
            document.body.appendChild(a); a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            if (shareText) {
                const note = '\n\n(Pièce jointe téléchargée séparément — pensez à l\'attacher à cet e-mail.)';
                window.location.href = `mailto:?subject=${encodeURIComponent(shareTitle)}&body=${encodeURIComponent(shareText + note)}`;
            }
        };

        const canShareFiles = typeof navigator !== 'undefined' && typeof navigator.share === 'function' && typeof navigator.canShare === 'function';

        // Open a printable, standalone report with the full written record AND embedded photos/audio,
        // so the owner can save it as PDF or print it to hand/send to the vétérinaire (mailto: can't carry attachments)
        const openDossierReport = (animal) => {
            const { vaccinNames, lastWeight, currentMedications } = getAnimalDossier(animal);
            const observations = [...(animal.observations || [])].sort((a, b) => new Date(b.date) - new Date(a.date));
            const win = window.open('', '_blank');
            if (!win) return;

            const obsHtml = observations.length > 0
                ? observations.map(o => `
                    <div class="obs">
                        <p class="obs-head"><strong>${escapeHtml(TYPE_LABELS[o.type] || o.type)}</strong> — ${escapeHtml(o.date)}</p>
                        ${o.description ? `<p>${escapeHtml(o.description)}</p>` : ''}
                        ${o.photo ? `<img src="${escapeHtml(o.photo)}" alt="Photo observation" />` : ''}
                        ${o.audio ? `<audio controls src="${escapeHtml(o.audio)}"></audio>` : ''}
                    </div>`).join('')
                : '<p>Aucune observation enregistrée</p>';

            win.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>Dossier santé - ${escapeHtml(animal.nom)}</title>
                <style>
                    body { font-family: -apple-system, Arial, sans-serif; padding: 24px; color: #1f2937; max-width: 800px; margin: 0 auto; }
                    h1 { color: #10b981; margin-bottom: 4px; }
                    h2 { margin-top: 28px; border-bottom: 2px solid #e5e7eb; padding-bottom: 6px; font-size: 18px; }
                    .obs { margin-bottom: 14px; padding: 12px; background: #f9fafb; border-radius: 8px; }
                    .obs-head { margin: 0 0 6px; }
                    img { max-width: 320px; display: block; margin-top: 8px; border-radius: 6px; }
                    audio { margin-top: 8px; display: block; }
                    .print-btn { padding: 10px 18px; background: #10b981; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; margin-bottom: 20px; }
                    @media print { .print-btn { display: none; } }
                </style></head>
                <body>
                    <button class="print-btn" onclick="window.print()">🖨️ Imprimer / Enregistrer en PDF</button>
                    <h1>🐾 Dossier santé de ${escapeHtml(animal.nom)}</h1>
                    <p>${escapeHtml(EMOJIS_ESPECE[animal.espece] || '')} ${escapeHtml(animal.espece || '')}${animal.race ? ' • ' + escapeHtml(animal.race) : ''}${animal.sexe ? ' • ' + (animal.sexe === 'male' ? 'Mâle' : 'Femelle') : ''}${animal.sterilise ? ' (stérilisé/castré)' : ''}</p>
                    ${animal.dateNaissance ? `<p>Date de naissance : ${escapeHtml(formatDate(animal.dateNaissance))}</p>` : ''}
                    <h2>💉 Vaccins</h2>
                    <p>${vaccinNames.length > 0 ? escapeHtml(vaccinNames.join(', ')) : 'Aucun enregistré'}</p>
                    <h2>⚖️ Poids actuel</h2>
                    <p>${lastWeight ? `${escapeHtml(lastWeight.valeur)} kg (mesuré le ${escapeHtml(lastWeight.date)})` : 'Non renseigné'}</p>
                    <h2>💊 Médicaments en cours</h2>
                    <p>${currentMedications.length > 0 ? currentMedications.map(m => `${escapeHtml(m.nom)} — ${escapeHtml(m.dosage)}${escapeHtml(m.unite)}, ${escapeHtml(m.frequence)}`).join('<br>') : 'Aucun'}</p>
                    <h2>📋 Observations</h2>
                    ${obsHtml}
                </body></html>`);
            win.document.close();
        };

        // ── Service Worker registration ──────────────────────────────────
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(() => {});
            });
        }

        // Request notification permission and schedule local reminders via SW
        const scheduleReminders = async (reminders) => {
            if (!('Notification' in window) || !navigator.serviceWorker) return;
            if (Notification.permission === 'default') await Notification.requestPermission();
            if (Notification.permission !== 'granted') return;
            const reg = await navigator.serviceWorker.ready;
            reminders.forEach(r => {
                const label = r.type === 'vaccin' ? '💉' : r.type === 'medicament' ? '💊' : r.type === 'antiparasitaire' ? '🦟' : '🪱';
                const delayMs = Math.max(0, (r.daysUntil - 1)) * 86400 * 1000;
                reg.active?.postMessage({
                    type: 'SCHEDULE_NOTIFICATION',
                    title: `${label} Rappel — ${r.animal}`,
                    body: `${r.nom} : ${r.daysUntil} jour${r.daysUntil > 1 ? 's' : ''} restant${r.daysUntil > 1 ? 's' : ''}`,
                    delay: delayMs,
                });
            });
        };

        // Main App Component
        function App() {
            const [user, setUser] = React.useState(null);
            const [loading, setLoading] = React.useState(true);
            const [activeTab, setActiveTab] = React.useState('accueil');
            const [animals, setAnimals] = React.useState([]);
            const [selectedAnimal, setSelectedAnimal] = React.useState(null);
            const [reminderSettings, setReminderSettings] = React.useState({ vaccin: 3, medicament: 3, antiparasitaire: 14, vermifuge: 14 });
            const [userRole, setUserRole] = React.useState(null); // null (chargement) | 'proprietaire' | 'veterinaire'
            const [isDesktop, setIsDesktop] = React.useState(window.innerWidth >= 1024);
            const [showMenu, setShowMenu] = React.useState(false);
            const [budgetFilter, setBudgetFilter] = React.useState('tout');

            // Auth State
            React.useEffect(() => {
                onAuthStateChanged(auth, async (currentUser) => {
                    setUser(currentUser);
                    setLoading(false);
                    if (currentUser) {
                        loadAnimalsFromFirestore(currentUser.uid);
                        loadSettings(currentUser.uid);
                    } else {
                        setUserRole(null);
                    }
                });
            }, []);

            // Responsive layout: switch between sidebar (desktop) and hamburger menu (mobile)
            React.useEffect(() => {
                const handleResize = () => setIsDesktop(window.innerWidth >= 1024);
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            // Load Animals from Firestore
            const loadAnimalsFromFirestore = async (uid) => {
                try {
                    const q = query(collection(db, 'animals'), where('userId', '==', uid));
                    const querySnapshot = await getDocs(q);
                    const animalsData = querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setAnimals(animalsData);
                    if (animalsData.length > 0) setSelectedAnimal(animalsData[0].id);
                } catch (error) {
                    console.error('Erreur loading animals:', error);
                }
            };

            // Load Settings (settings/{uid}; migrates legacy docs keyed by a random id)
            const loadSettings = async (uid) => {
                try {
                    const ref = doc(db, 'settings', uid);
                    let snap = await getDoc(ref);
                    if (!snap.exists()) {
                        const q = query(collection(db, 'settings'), where('userId', '==', uid));
                        const legacy = await getDocs(q);
                        if (legacy.docs.length > 0) {
                            await setDoc(ref, legacy.docs[0].data(), { merge: true });
                            snap = await getDoc(ref);
                        }
                    }
                    if (snap.exists()) {
                        const settings = snap.data();
                        const s = settings.reminders || {};
                        setReminderSettings({ vaccin: s.vaccin ?? 3, medicament: s.medicament ?? 3, antiparasitaire: s.antiparasitaire ?? 14, vermifuge: s.vermifuge ?? 14 });
                        setUserRole(settings.role || 'proprietaire');
                    } else {
                        await setDoc(ref, { userId: uid, role: 'proprietaire', reminders: { vaccin: 3, medicament: 3, antiparasitaire: 14, vermifuge: 14 } });
                        setUserRole('proprietaire');
                    }
                } catch (error) {
                    console.error('Erreur loading settings:', error);
                    setUserRole('proprietaire');
                }
            };

            // Save Animal to Firestore
            const saveAnimal = async (animalData) => {
                try {
                    if (animalData.id && animals.find(a => a.id === animalData.id)) {
                        // Update existing
                        await updateDoc(doc(db, 'animals', animalData.id), animalData);
                    } else {
                        // Create new
                        const docRef = await addDoc(collection(db, 'animals'), { ...animalData, userId: user.uid, createdAt: new Date() });
                        animalData.id = docRef.id;
                    }
                    loadAnimalsFromFirestore(user.uid);
                } catch (error) {
                    console.error('Erreur saving animal:', error);
                }
            };

            // Delete Animal
            const deleteAnimalFromFirestore = async (animalId) => {
                try {
                    await deleteDoc(doc(db, 'animals', animalId));
                    loadAnimalsFromFirestore(user.uid);
                    setSelectedAnimal(null);
                } catch (error) {
                    console.error('Erreur deleting animal:', error);
                }
            };

            // Append an item (vaccin, médicament, observation...) to an animal's array field and persist to Firestore
            const addAnimalItem = (animal, type, item) => {
                const updated = { ...animal, [type]: [...(animal[type] || []), { ...item, id: Date.now() }] };
                saveAnimal(updated);
            };

            // Remove an item from an animal's array field by id and persist to Firestore
            const deleteAnimalItem = (animal, type, itemId) => {
                const updated = { ...animal, [type]: (animal[type] || []).filter(i => i.id !== itemId) };
                saveAnimal(updated);
            };

            // Update an existing item in an animal's array field by id and persist to Firestore
            const updateAnimalItem = (animal, type, itemId, updates) => {
                const updated = { ...animal, [type]: (animal[type] || []).map(i => i.id === itemId ? { ...i, ...updates } : i) };
                saveAnimal(updated);
            };

            // Merge field updates (e.g. assigned vétérinaire) into an animal and persist to Firestore
            const updateAnimalFields = (animal, updates) => {
                saveAnimal({ ...animal, ...updates });
            };

            // Filter an animal's budget entries by the selected period
            const getFilteredBudget = (budget) => {
                const today = new Date();
                const weekAgo = new Date(today.getTime() - 7 * 24 * 60 * 60 * 1000);
                const monthAgo = new Date(today.getFullYear(), today.getMonth(), 1);
                const yearAgo = new Date(today.getFullYear(), 0, 1);

                return (budget || []).filter(b => {
                    const bDate = new Date(b.date);
                    if (budgetFilter === 'semaine') return bDate >= weekAgo;
                    if (budgetFilter === 'mois') return bDate >= monthAgo;
                    if (budgetFilter === 'annee') return bDate >= yearAgo;
                    return true;
                });
            };

            // Check Reminders across all animals, sorted by urgency
            const getReminders = () => {
                const reminders = [];
                const today = new Date();

                animals.forEach(animal => {
                    (animal.vaccins || []).forEach(v => {
                        const vaccineDate = new Date(v.rappel || v.date);
                        const daysUntil = Math.ceil((vaccineDate - today) / (1000 * 60 * 60 * 24));
                        if (daysUntil <= reminderSettings.vaccin && daysUntil > 0) {
                            reminders.push({ type: 'vaccin', animal: animal.nom, nom: v.nom, daysUntil, urgent: daysUntil <= 1 });
                        }
                    });

                    (animal.medicaments || []).forEach(m => {
                        const medDate = new Date(m.dateFin);
                        const daysUntil = Math.ceil((medDate - today) / (1000 * 60 * 60 * 24));
                        if (daysUntil <= reminderSettings.medicament && daysUntil > 0) {
                            reminders.push({ type: 'medicament', animal: animal.nom, nom: m.nom, daysUntil, urgent: daysUntil <= 1 });
                        }
                    });

                    (animal.antiparasitaires || []).forEach(t => {
                        const d = new Date(t.prochainTraitement);
                        const daysUntil = Math.ceil((d - today) / (1000 * 60 * 60 * 24));
                        if (daysUntil <= (reminderSettings.antiparasitaire ?? 14) && daysUntil > 0) {
                            reminders.push({ type: 'antiparasitaire', animal: animal.nom, nom: t.nom || 'Antiparasitaire', daysUntil, urgent: daysUntil <= 1 });
                        }
                    });

                    (animal.vermifuges || []).forEach(t => {
                        const d = new Date(t.prochainTraitement);
                        const daysUntil = Math.ceil((d - today) / (1000 * 60 * 60 * 24));
                        if (daysUntil <= (reminderSettings.vermifuge ?? 14) && daysUntil > 0) {
                            reminders.push({ type: 'vermifuge', animal: animal.nom, nom: t.nom || 'Vermifuge', daysUntil, urgent: daysUntil <= 1 });
                        }
                    });
                });

                return reminders.sort((a, b) => a.daysUntil - b.daysUntil);
            };

            // Open a pre-filled email so the user can send themselves a reminder
            const sendEmailReminder = (reminder) => {
                const subject = `⚠️ Rappel: ${reminder.nom} expire dans ${reminder.daysUntil} jours`;
                const body = `Bonjour,\n\nRappel: ${reminder.nom} pour ${reminder.animal} expire dans ${reminder.daysUntil} jours.\n\nVeuillez prendre les mesures nécessaires.\n\nCarnet Santé PRO`;
                window.location.href = `mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
            };

            const reminders = getReminders();

            // Schedule local push notifications whenever reminders change
            React.useEffect(() => {
                if (reminders.length > 0) scheduleReminders(reminders);
            }, [animals, reminderSettings]);

            if (loading || (user && userRole === null)) return <div style={{ padding: '20px', textAlign: 'center' }}>Chargement...</div>;

            if (!user) {
                return <LoginScreen auth={auth} db={db} />;
            }

            if (userRole === 'veterinaire') {
                return <VetApp user={user} auth={auth} db={db} />;
            }

            return (
                <div style={{ display: 'flex', height: '100vh', background: '#f9fafb' }}>
                    {isDesktop && <Sidebar activeTab={activeTab} setActiveTab={setActiveTab} user={user} auth={auth} />}

                    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflowY: 'auto' }}>
                        {!isDesktop && <MobileHeader showMenu={showMenu} setShowMenu={setShowMenu} />}
                        {!isDesktop && showMenu && <MobileMenu activeTab={activeTab} setActiveTab={setActiveTab} setShowMenu={setShowMenu} auth={auth} />}

                        {/* Reminders Banner */}
                        {reminders.length > 0 && (
                            <div className="animate-fade-in" style={{ background: '#fef3c7', padding: '16px', margin: '16px', borderRadius: '8px', borderLeft: '4px solid #f59e0b' }}>
                                <h3 style={{ color: '#d97706', marginBottom: '8px' }}>⚠️ À faire urgemment ({reminders.length})</h3>
                                {reminders.map((r, i) => (
                                    <div key={i} style={{ padding: '8px', background: 'white', marginBottom: '8px', borderRadius: '4px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', border: r.urgent ? '2px solid #ef4444' : '1px solid #fcd34d' }}>
                                        <div>
                                            <span>{r.nom} ({r.animal}) - {r.daysUntil} jours restants</span>
                                            {r.urgent && <span style={{ marginLeft: '8px', background: '#ef4444', color: 'white', padding: '2px 8px', borderRadius: '4px', fontSize: '12px', fontWeight: 'bold' }}>URGENT</span>}
                                        </div>
                                        <button onClick={() => sendEmailReminder(r)} style={{ padding: '6px 12px', background: '#f59e0b', color: 'white', border: 'none', borderRadius: '4px', cursor: 'pointer' }}>
                                            📧 Rappel email
                                        </button>
                                    </div>
                                ))}
                            </div>
                        )}

                        {!isDesktop && (
                            <div style={{ maxWidth: '1200px', margin: '0 auto', padding: '0 16px', width: '100%' }}>
                                <AdBanner format="horizontal" slot="xxxxxxxxxx" className="ad-banner-top" />
                            </div>
                        )}

                        <Content
                            activeTab={activeTab}
                            setActiveTab={setActiveTab}
                            animals={animals}
                            selectedAnimal={selectedAnimal}
                            setSelectedAnimal={setSelectedAnimal}
                            saveAnimal={saveAnimal}
                            deleteAnimal={deleteAnimalFromFirestore}
                            addAnimalItem={addAnimalItem}
                            deleteAnimalItem={deleteAnimalItem}
                            updateAnimalItem={updateAnimalItem}
                            updateAnimalFields={updateAnimalFields}
                            budgetFilter={budgetFilter}
                            setBudgetFilter={setBudgetFilter}
                            getFilteredBudget={getFilteredBudget}
                            reminderSettings={reminderSettings}
                            setReminderSettings={setReminderSettings}
                            reminders={reminders}
                            sendEmailReminder={sendEmailReminder}
                            user={user}
                            db={db}
                        />

                        <div style={{ maxWidth: '1200px', margin: '0 auto', padding: '0 16px 16px', width: '100%' }}>
                            <AdBanner format="horizontal" slot="xxxxxxxxxx" className="ad-banner-bottom" />
                        </div>
                    </div>
                </div>
            );
        }

                        await signInWithEmailAndPassword(auth, email, password);

                            <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.26c-.81.54-1.84.86-3.04.86-2.34 0-4.32-1.58-5.03-3.7H.96v2.33C2.44 15.98 5.48 18 9 18z"/>
                            <path fill="#FBBC05" d="M3.97 10.72c-.18-.54-.28-1.12-.28-1.72s.1-1.18.28-1.72V4.95H.96A8.996 8.996 0 0 0 0 9c0 1.45.35 2.83.96 4.05l3.01-2.33z"/>

                    </p>
